<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Brits Rentals</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Include same header as index.html -->
    <header class="main-header">
        <div class="container">
            <div class="logo">
                <img src="https://i.imgur.com/placeholder-logo.png" alt="Brits Logo">
                <div class="logo-text">
                    <h1>Brits</h1>
                    <span>Your Technology Partner</span>
                </div>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html" class="active">Products</a></li>
                    <li><a href="owner.html">Owner</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="products-page">
        <div class="container">
            <div class="breadcrumb">
                <a href="index.html">Home</a> / <span id="categoryName">All Products</span>
            </div>
            
            <h1 class="page-title" id="pageTitle">Complete Range of IT Products on Rent</h1>
            
            <div class="products-layout">
                <aside class="filters">
                    <h3>Filter Products</h3>
                    <div class="filter-group">
                        <h4>Category</h4>
                        <label><input type="checkbox" value="laptop" onchange="filterProducts()"> Laptops</label>
                        <label><input type="checkbox" value="desktop" onchange="filterProducts()"> Desktops</label>
                        <label><input type="checkbox" value="monitor" onchange="filterProducts()"> Monitors</label>
                        <label><input type="checkbox" value="tablet" onchange="filterProducts()"> Tablets</label>
                    </div>
                    <div class="filter-group">
                        <h4>Brand</h4>
                        <label><input type="checkbox" value="apple" onchange="filterProducts()"> Apple</label>
                        <label><input type="checkbox" value="dell" onchange="filterProducts()"> Dell</label>
                        <label><input type="checkbox" value="hp" onchange="filterProducts()"> HP</label>
                        <label><input type="checkbox" value="lenovo" onchange="filterProducts()"> Lenovo</label>
                    </div>
                    <div class="filter-group">
                        <h4>Price Range</h4>
                        <input type="range" min="500" max="50000" id="priceRange" onchange="filterProducts()">
                        <span id="priceValue">₹500 - ₹50000</span>
                    </div>
                </aside>

                <div class="products-listing">
                    <div class="sort-bar">
                        <span id="productCount">Showing all products</span>
                        <select onchange="sortProducts(this.value)">
                            <option value="popular">Most Popular</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                            <option value="newest">Newest First</option>
                        </select>
                    </div>
                    
                    <div class="products-grid" id="productsGrid">
                        <!-- Products loaded dynamically -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Product Detail Modal -->
    <div id="productModal" class="modal product-modal">
        <div class="modal-content large">
            <span class="close" onclick="closeProductModal()">&times;</span>
            <div class="product-detail" id="productDetail">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
