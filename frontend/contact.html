<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Brits Rentals</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
<header class="main-header">
    <div class="container">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
            <!-- SVG Logo -->
            <svg class="logo-svg" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Blue Triangle/Play Button Shape -->
                <defs>
                    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
                    </linearGradient>
                </defs>
                
                <!-- Left Blue Triangle -->
                <path d="M 10,10 L 10,90 L 70,50 Z" fill="url(#blueGrad)" stroke="#1e3a8a" stroke-width="2"/>
                <path d="M 15,18 L 15,82 L 65,50 Z" fill="white" opacity="0.3"/>
                
                <!-- Letter B -->
                <text x="75" y="75" font-family="Arial Black, sans-serif" font-size="70" font-weight="900" fill="url(#blueGrad)">B</text>
                
                <!-- Letter r (red) -->
                <text x="130" y="75" font-family="Arial, sans-serif" font-size="60" font-weight="700" fill="url(#redGrad)">r</text>
                
                <!-- Power Button Symbol (replacing 'i') -->
                <circle cx="172" cy="55" r="18" fill="none" stroke="url(#redGrad)" stroke-width="4"/>
                <line x1="172" y1="40" x2="172" y2="55" stroke="url(#redGrad)" stroke-width="4" stroke-linecap="round"/>
                
                <!-- Letter t -->
                <text x="188" y="75" font-family="Arial, sans-serif" font-size="60" font-weight="700" fill="url(#blueGrad)">t</text>
                
                <!-- Letter s -->
                <text x="225" y="75" font-family="Arial, sans-serif" font-size="60" font-weight="700" fill="url(#blueGrad)">s</text>
                
                <!-- Tagline -->
                <text x="150" y="95" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle" letter-spacing="1">YOUR TECHNOLOGY PARTNER</text>
            </svg>
        </div>
        
        
        
</header>
                    <h1>Brits</h1>
                    <span>Your Technology Partner</span>
                </div>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="owner.html">Owner</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="contact-page">
        <div class="container">
            <h1 class="page-title">Contact Us</h1>
            
            <div class="contact-grid">
                <div class="contact-info-cards">
                    <div class="contact-card">
                        <i class="fas fa-map-marker-alt"></i>
                        <h3>Visit Us</h3>
                        <p>205, 2nd Floor, Aapka Bazar<br>Gurudwara Road, Gurgaon<br>Haryana 122001</p>
                    </div>
                    <div class="contact-card">
                        <i class="fas fa-phone"></i>
                        <h3>Call Us</h3>
                        <p>+91 8800379050<br>Mon-Sat: 9AM - 8PM</p>
                    </div>
                    <div class="contact-card">
                        <i class="fas fa-envelope"></i>
                        <h3>Email Us</h3>
                        <p>roopsinghpal54@gmail.com<br>support@britsrentals.com</p>
                    </div>
                </div>

                <div class="contact-form-section">
                    <h2>Send Us a Message</h2>
                    <form id="contactForm" class="contact-form">
                        <div class="form-row">
                            <input type="text" placeholder="Your Name" required>
                            <input type="email" placeholder="Your Email" required>
                        </div>
                        <div class="form-row">
                            <input type="tel" placeholder="Phone Number" required>
                            <input type="text" placeholder="Subject" required>
                        </div>
                        <textarea placeholder="Your Message" rows="6" required></textarea>
                        <button type="submit" class="btn-submit">Send Message</button>
                    </form>
                </div>
            </div>

            <div class="map-section">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3508.1234567890123!2d77.0266!3d28.4595!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjjCsDI3JzM0LjIiTiA3N8KwMDEnMzUuOCJF!5e0!3m2!1sen!2sin!4v1234567890" 
                    width="100%" 
                    height="400" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy">
                </iframe>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
